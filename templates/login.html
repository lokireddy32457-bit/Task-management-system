{% extends 'base.html' %}
{% block title %}TaskFlow — Sign In{% endblock %}

{% block body %}
<div class="auth-page">
  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="auth-card">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">TaskFlow</span>
    </div>
    <p class="auth-tagline">Manage tasks. Stay productive.</p>

    <!-- Tabs -->
    <div class="auth-tabs" id="authTabs">
      <button class="tab-btn {% if tab != 'register' %}active{% endif %}" onclick="switchTab('login')" id="tab-login">Sign In</button>
      <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register')" id="tab-register">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form {% if tab == 'register' %}hidden{% endif %}" method="POST" action="/login">
      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form {% if tab != 'register' %}hidden{% endif %}" method="POST" action="/register">
      {% if reg_error %}
        <div class="alert alert-error">{{ reg_error }}</div>
      {% endif %}
      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" placeholder="Choose a username" required autocomplete="username"/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" name="email" placeholder="your@email.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Create a strong password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>

    <p class="auth-footer">Task Management System 2026</p>
  </div>
</div>

<script>
  function switchTab(tab) {
    const loginForm    = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const tabLogin     = document.getElementById('tab-login');
    const tabRegister  = document.getElementById('tab-register');

    if (tab === 'login') {
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
    } else {
      registerForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
    }
  }
</script>
{% endblock %}
